project:
  name: skills
  description: The CLI for the open agent skills ecosystem (Java port)
  longDescription: |
    Java port of vercel-labs/skills CLI.
    Install, manage, and discover agent skills for coding assistants.
  authors:
    - Max Rydahl Andersen
  license: MIT
  links:
    homepage: https://github.com/maxandersen/jskills
    documentation: https://github.com/maxandersen/jskills#readme
  languages:
    java:
      groupId: sh.skills
      artifactId: jskills
      mainClass: sh.skills.Skills
      version: 25
  inceptionYear: "2025"

release:
  github:
    owner: maxandersen
    name: jskills
    overwrite: true
    tagName: "v{{projectVersion}}"
    releaseName: "v{{projectVersion}}"
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        enabled: true
      hide:
        categories:
          - merge

distributions:
  skills:
    type: SINGLE_JAR
    artifacts:
      - path: release/jskills-{{projectVersion}}.jar

files:
  artifacts:
    - path: release/skills-linux-amd64
      platform: linux-x86_64
    - path: release/skills-macos-aarch64
      platform: osx-aarch_64
    - path: release/skills-windows-amd64.exe
      platform: windows-x86_64
